<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<th:block th:replace="fragments/head :: head('Listar Tanque')"></th:block>

<body>

<th:block th:replace="fragments/head :: header"></th:block>

<link rel="stylesheet" th:href="@{/css/indexStyle.css}" />

<div class="container">
    <h1>Listagem de Tanque</h1>

      <div class="card">
        <table class="table table-striped">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Descrição</th>
              <th>Tamanho (cm)</th>
              <th>Quantidade</th>
              <th>Espécie</th>
              <th>Peso médio</th>
              <th>Editar</th>
              <th>Excluir</th>
            </tr>
          </thead>
          <tbody>
            <!-- Ajuste importante aqui -->
            <tr th:each="tanque : ${tanque}">
              <td th:text="${tanque.nome}"></td>
              <td th:text="${tanque.descricao}"></td>
              <td th:text="${tanque.tamanhoPeixes}"></td>
              <td th:text="${tanque.quantidadePeixes}"></td>
              <td>
                <span class="badge-especie" th:text="${tanque.especie}"></span>
              </td>
              <td th:text="${tanque.peso}"></td>

             
              <td>
                <a th:href="@{/tanque/edit/{id}(id=${tanque.id})}">Editar</a>
              </td>
              <td>
                <a th:href="@{/tanque/delete/{id}(id=${tanque.id})}">Excluir</a>
              </td>
            </tr>
          </tbody>
        </table>

       
        <div class="row mt-3">
          <a th:href="@{/tanque/create}">
            <button class="btn btn-primary">Cadastrar Tanque</button>
          </a>
        </div>

      </div>
    </div>
    <th:block th:replace="~{/../fragments/footer :: footer}"></th:block>
  </body>
</html>
