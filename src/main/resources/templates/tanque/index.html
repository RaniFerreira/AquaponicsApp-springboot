<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Listagem de Tanques</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" />

    <style>
      body {
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        font-family: Arial, sans-serif;
      }

      .container {
        margin-top: 50px;
      }

      h1 {
        color: white;
        text-align: center;
        margin-bottom: 30px;
        font-weight: bold;
      }

      .card {
        border-radius: 15px;
        box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
        padding: 20px;
        background: #ffffff;
      }

      .table thead {
        background-color: #2a5298;
        color: white;
      }

      .table tbody tr:hover {
        background-color: #f2f2f2;
        transition: 0.3s;
      }

      .badge-especie {
        background-color: #e6f1fb;
        color: #0c447c;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 13px;
      }
      .btn-primary {
        background-color: #2a5298;
        border: none;
      }

      .btn-primary:hover {
        background-color: #1e3c72;
      }

      
    </style>
  </head>
  <body>
    <div class="container">
      <a th:href="@{/tanque/create}" class="btn btn-primary mb-3">Cadastrar Tanque</a>
      <h1>Listagem de Tanques</h1>

      <div class="card">
        <table class="table table-striped">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Descrição</th>
              <th>Tamanho dos Peixes (cm)</th>
              <th>Quantidade</th>
              <th>Espécie</th>
              <th>Peso médio</th>
              <th scope="col">Excluir</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="tanque : ${tanque}">
              <td th:text="${tanque.nome}"></td>
              <td th:text="${tanque.descricao}"></td>
              <td th:text="${tanque.tamanhoPeixes}"></td>
              <td th:text="${tanque.quantidadePeixes}"></td>
              <td>
                <span class="badge-especie" th:text="${tanque.especie}"></span>
              </td>
              <td th:text="${tanque.peso}"></td>
              <td>
              <a th:href="@{/tanque/delete/{id}(id=${tanque.id})}">Deletar</a>
            </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </body>
</html>
