<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<th:block th:replace="fragments/head :: head('Cadastrar Tanque')"></th:block>

<body>

<th:block th:replace="fragments/head :: header"></th:block>

<link rel="stylesheet" th:href="@{/css/createStyle.css}" />

<div class="container">
    <h1>Cadastrar Tanque</h1>

    <div class="card">
        <form th:action="@{/tanque/save}" th:object="${tanque}" method="POST">

            <div class="form-group">
                <label>Nome</label>
                <input type="text" th:field="*{nome}" class="form-control" placeholder="Nome do tanque">
                <p th:if="${#fields.hasErrors('nome')}" class="text-danger" th:errors="*{nome}"></p>
            </div>

            <div class="form-group">
                <label>Descrição</label>
                <textarea th:field="*{descricao}" class="form-control"></textarea>
                <p th:if="${#fields.hasErrors('descricao')}" class="text-danger" th:errors="*{descricao}"></p>
            </div>

            <div class="form-group">
                <label>Tamanho dos Peixes (cm)</label>
                <input type="number" step="0.01" th:field="*{tamanhoPeixes}" class="form-control">
                <p th:if="${#fields.hasErrors('tamanhoPeixes')}" class="text-danger" th:errors="*{tamanhoPeixes}"></p>
            </div>

            <div class="form-group">
                <label>Quantidade de Peixes</label>
                <input type="number" th:field="*{quantidadePeixes}" class="form-control">
                <p th:if="${#fields.hasErrors('quantidadePeixes')}" class="text-danger" th:errors="*{quantidadePeixes}"></p>
            </div>

            <div class="form-group">
                <label>Espécie</label>
                <input type="text" th:field="*{especie}" class="form-control">
                <p th:if="${#fields.hasErrors('especie')}" class="text-danger" th:errors="*{especie}"></p>
            </div>

            <div class="form-group">
                <label>Peso médio (kg)</label>
                <input type="number" step="0.01" th:field="*{peso}" class="form-control">
                <p th:if="${#fields.hasErrors('peso')}" class="text-danger" th:errors="*{peso}"></p>
            </div>

            <button type="submit" class="btn btn-primary">
                Cadastrar
            </button>

        </form>
    </div>
</div>
<th:block th:replace="~{/../fragments/footer :: footer}"></th:block>

</body>
</html>
