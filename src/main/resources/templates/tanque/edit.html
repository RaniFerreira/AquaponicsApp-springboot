<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<th:block th:replace="fragments/head :: head('Editar Tanque')"></th:block>

<body>

<th:block th:replace="fragments/head :: header"></th:block>

<link rel="stylesheet" th:href="@{/css/editStyle.css}" />

<div class="container">

    <h1>Atualizar Tanque</h1>

    <div class="card">

        <form th:action="@{/tanque/save}" th:object="${tanque}" method="POST">

        
            <input type="hidden" th:field="*{id}" />

          
            <div th:if="${#fields.hasGlobalErrors()}">
                <p th:each="err : ${#fields.globalErrors()}"
                   th:text="${err}"></p>
            </div>

        
            <div class="form-group">
                <label>Nome</label>
                <input type="text" th:field="*{nome}" class="form-control">

                <small class="text-danger"
                       th:if="${#fields.hasErrors('nome')}"
                       th:errors="*{nome}"></small>
            </div>

       
            <div class="form-group">
                <label>Descrição</label>
                <textarea th:field="*{descricao}" class="form-control"></textarea>

                <small class="text-danger"
                       th:if="${#fields.hasErrors('descricao')}"
                       th:errors="*{descricao}"></small>
            </div>

          
            <div class="form-group">
                <label>Tamanho dos Peixes (cm)</label>
                <input type="number" step="0.01" th:field="*{tamanhoPeixes}" class="form-control">

                <small class="text-danger"
                       th:if="${#fields.hasErrors('tamanhoPeixes')}"
                       th:errors="*{tamanhoPeixes}"></small>
            </div>

          
            <div class="form-group">
                <label>Quantidade de Peixes</label>
                <input type="number" th:field="*{quantidadePeixes}" class="form-control">

                <small class="text-danger"
                       th:if="${#fields.hasErrors('quantidadePeixes')}"
                       th:errors="*{quantidadePeixes}"></small>
            </div>

           
            <div class="form-group">
                <label>Espécie</label>
                <input type="text" th:field="*{especie}" class="form-control">

                <small class="text-danger"
                       th:if="${#fields.hasErrors('especie')}"
                       th:errors="*{especie}"></small>
            </div>

           
            <div class="form-group">
                <label>Peso médio (kg)</label>
                <input type="number" step="0.01" th:field="*{peso}" class="form-control">

                <small class="text-danger"
                       th:if="${#fields.hasErrors('peso')}"
                       th:errors="*{peso}"></small>
            </div>

            <button type="submit" class="btn btn-primary">
                Atualizar Tanque
            </button>

        </form>

    </div>
</div>

<th:block th:replace="~{/../fragments/footer :: footer}"></th:block>

</body>
</html>
